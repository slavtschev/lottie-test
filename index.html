<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lottie Test</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        display: flex;
        background: #fff;
        font-family: sans-serif;
        color: #333;
        overflow: hidden;
        height: 100vh;
      }

      /* Sidebar */
      #sidebar {
        width: 200px;
        min-width: 200px;
        height: 100vh;
        background: #f7f7f7;
        border-right: 1px solid #e0e0e0;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      #sidebar-header {
        padding: 18px 16px 12px;
        font-size: 0.7rem;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: #999;
        border-bottom: 1px solid #e0e0e0;
      }
      #version-list {
        flex: 1;
        overflow-y: auto;
        padding: 8px 0;
      }
      .version-item {
        padding: 10px 16px;
        font-size: 0.85rem;
        cursor: pointer;
        border-radius: 6px;
        margin: 2px 8px;
        transition: background 0.15s;
        color: #555;
      }
      .version-item:hover { background: #ebebeb; color: #111; }
      .version-item.active {
        background: #111;
        color: #fff;
        font-weight: 600;
      }
      #sidebar-footer {
        padding: 12px 8px;
        border-top: 1px solid #e0e0e0;
      }
      #drop-zone {
        font-size: 0.78rem;
        color: #999;
        cursor: pointer;
        text-align: center;
        padding: 10px 8px;
        border-radius: 8px;
        border: 1px dashed #ccc;
        transition: border-color 0.2s, color 0.2s;
        line-height: 1.4;
      }
      #drop-zone:hover { border-color: #999; color: #555; }
      #drop-zone.drag-over { border-color: #111; color: #111; }

      /* Main area */
      #main {
        flex: 1;
        display: flex;
        flex-direction: column;
        position: relative;
        overflow: hidden;
      }
      #lottie-container {
        flex: 1;
        background: #fff;
      }

      /* Floating controls bar */
      #ui {
        position: absolute;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 12px;
        background: rgba(255,255,255,0.85);
        backdrop-filter: blur(8px);
        border: 1px solid #ddd;
        border-radius: 999px;
        padding: 10px 20px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        white-space: nowrap;
      }
      button {
        padding: 6px 16px;
        border: 1px solid #ccc;
        border-radius: 999px;
        background: #fff;
        color: #333;
        cursor: pointer;
        font-size: 0.85rem;
        transition: background 0.15s, border-color 0.15s;
      }
      button:hover { background: #f0f0f0; border-color: #999; }
      label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.8rem;
        color: #666;
      }
      input[type=range] { width: 100px; cursor: pointer; }
    </style>
  </head>
  <body>
    <!-- Sidebar -->
    <aside id="sidebar">
      <div id="sidebar-header">Versions</div>
      <div id="version-list"></div>
      <div id="sidebar-footer">
        <div id="drop-zone">+ Drop Lottie JSON<br>to add version</div>
        <input type="file" id="file-input" accept=".json" style="display:none" />
      </div>
    </aside>

    <!-- Main -->
    <div id="main">
      <div id="lottie-container"></div>
      <div id="ui">
        <button id="btn-play">Play</button>
        <button id="btn-pause">Pause</button>
        <button id="btn-stop">Stop</button>
        <button id="btn-loop" data-looping="true">Loop: On</button>
        <label>
          Speed
          <input type="range" id="speed" min="0.1" max="3" step="0.1" value="1" />
          <button id="btn-reset-speed">1×</button>
        </label>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
