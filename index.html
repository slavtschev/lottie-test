<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lottie Test</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #fff;
        font-family: sans-serif;
        color: #333;
        overflow: hidden;
      }
      #lottie-container {
        width: 100vw;
        height: 100vh;
        background: #fff;
      }
      /* floating controls bar */
      #ui {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 12px;
        background: rgba(255,255,255,0.85);
        backdrop-filter: blur(8px);
        border: 1px solid #ddd;
        border-radius: 999px;
        padding: 10px 20px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      }
      button {
        padding: 6px 16px;
        border: 1px solid #ccc;
        border-radius: 999px;
        background: #fff;
        color: #333;
        cursor: pointer;
        font-size: 0.85rem;
        transition: background 0.15s, border-color 0.15s;
      }
      button:hover { background: #f0f0f0; border-color: #999; }
      label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.8rem;
        color: #666;
      }
      input[type=range] { width: 100px; cursor: pointer; }
      #drop-zone {
        font-size: 0.8rem;
        color: #999;
        cursor: pointer;
        white-space: nowrap;
        padding: 4px 8px;
        border-radius: 999px;
        border: 1px dashed #ccc;
        transition: border-color 0.2s, color 0.2s;
      }
      #drop-zone.drag-over { border-color: #333; color: #333; }
    </style>
  </head>
  <body>
    <div id="lottie-container"></div>
    <div id="ui">
      <button id="btn-play">Play</button>
      <button id="btn-pause">Pause</button>
      <button id="btn-stop">Stop</button>
      <button id="btn-loop" data-looping="true">Loop: On</button>
      <label>
        Speed
        <input type="range" id="speed" min="0.1" max="3" step="0.1" value="1" />
      </label>
      <div id="drop-zone">Drop JSON</div>
      <input type="file" id="file-input" accept=".json" style="display:none" />
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
